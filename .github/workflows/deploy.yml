name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          echo "Deploying claude-mcp → Coolify uuid=qkc0gocw4oogw4o888w44w4w"
          curl -s -f -X POST \
            "https://coolify.ofshore.dev/api/v1/deploy?uuid=qkc0gocw4oogw4o888w44w4w&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            && echo "✅ Deploy triggered" || echo "⚠️ Deploy trigger failed (non-critical)"
